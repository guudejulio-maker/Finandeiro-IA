<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceAI — Agente Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--bg4:#252a3a;
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
--txt:#e8eaf0;--txt2:#8b92a8;--txt3:#555d78;
--green:#34d399;--green-bg:rgba(52,211,153,0.1);--green-txt:#34d399;
--red:#f87171;--red-bg:rgba(248,113,113,0.1);--red-txt:#f87171;
--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.1);--blue-txt:#60a5fa;
--amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1);--amber-txt:#fbbf24;
--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.1);--purple-txt:#a78bfa;
--teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.1);
--radius:10px;--radius-lg:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}
.logo-title{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.sync-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.sync-dot.online{background:var(--green);animation:pulse 2s infinite}
.sync-dot.saving{background:var(--amber);animation:pulse 0.5s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-txt{font-size:10px;color:var(--txt3)}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{font-size:10px;color:var(--txt3);padding:10px 16px 4px;letter-spacing:0.8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--txt2);border-left:2px solid transparent;transition:all 0.15s;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:rgba(99,102,241,0.1);color:#818cf8;border-left-color:#818cf8;font-weight:500}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.sidebar-footer{padding:10px;border-top:1px solid var(--border)}
.ai-pill{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--purple-bg);border:1px solid rgba(167,139,250,0.2);border-radius:var(--radius)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);animation:pulse 2s infinite}
.ai-pill-txt{font-size:12px;color:var(--purple-txt);font-weight:500}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{padding:0 22px;height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.page-title{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.month-sel select{font-size:12px;padding:5px 9px;border:1px solid var(--border2);border-radius:7px;background:var(--bg3);color:var(--txt);margin-left:4px}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:14px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px 17px}
.mc-lbl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px}
.mc-val{font-size:23px;font-weight:600;letter-spacing:-0.5px}
.mc-sub{font-size:11px;color:var(--txt3);margin-top:5px}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:500;color:var(--txt3);border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:0.4px}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--txt)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
.bg{background:var(--green-bg);color:var(--green-txt)}
.br{background:var(--red-bg);color:var(--red-txt)}
.bb{background:var(--blue-bg);color:var(--blue-txt)}
.ba{background:var(--amber-bg);color:var(--amber-txt)}
.bp{background:var(--purple-bg);color:var(--purple-txt)}
.bt{background:var(--teal-bg);color:var(--teal)}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all 0.15s;border:1px solid transparent}
.btn-p{background:#6366f1;color:#fff;border-color:#6366f1}
.btn-p:hover{background:#4f46e5}
.btn-g{background:transparent;border-color:var(--border2);color:var(--txt2)}
.btn-g:hover{background:var(--bg3);color:var(--txt)}
.btn-d{background:var(--red-bg);color:var(--red-txt);border-color:rgba(248,113,113,0.2)}
.btn-s{background:var(--green-bg);color:var(--green-txt);border-color:rgba(52,211,153,0.2)}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:5px}
.ar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.fc{background:var(--bg2);border:1px solid rgba(99,102,241,0.3);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.ft{font-size:13px;font-weight:600;margin-bottom:12px}
.fg{display:grid;gap:10px;margin-bottom:12px}
.fg.c2{grid-template-columns:1fr 1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fg.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fg.c5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.fl label{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:500}
.fl input,.fl select,.fl textarea{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:7px;background:var(--bg3);color:var(--txt);font-family:'DM Sans',sans-serif}
.fl input:focus,.fl select:focus{outline:none;border-color:#6366f1}
.fl textarea{resize:vertical;min-height:60px}
.aip{background:linear-gradient(135deg,rgba(99,102,241,0.08),rgba(139,92,246,0.08));border:1px solid rgba(99,102,241,0.25);border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.aip-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px;font-size:13px;font-weight:600;color:var(--purple-txt)}
.aip-bd{font-size:13px;color:var(--txt2);line-height:1.7;min-height:36px}
.ail{display:flex;align-items:center;gap:8px;color:var(--txt3);font-size:12px;font-style:italic}
.aid span{animation:blink 1.4s infinite;display:inline-block}
.aid span:nth-child(2){animation-delay:0.2s}
.aid span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.pdf-drop{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg3)}
.pdf-drop:hover,.pdf-drop.drag{border-color:#6366f1;background:rgba(99,102,241,0.05)}
.hbr{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.hbl{font-size:11px;color:var(--txt2);width:88px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbt{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden}
.hbf{height:100%;border-radius:4px;transition:width 0.5s ease}
.hbv{font-size:10px;color:var(--txt3);width:68px;font-family:'DM Mono',monospace}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}
.dg{background:var(--green)}.da{background:var(--amber)}.dr{background:var(--red)}
.shd{font-size:13px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.div{height:1px;background:var(--border);margin:12px 0}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px}
.sr{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.sr:last-child{border-bottom:none}
.sl{font-size:13px;font-weight:500}
.ss{font-size:11px;color:var(--txt3);margin-top:2px}
.ki{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--txt);font-family:'DM Mono',monospace;width:280px}
.ki:focus{outline:none;border-color:#6366f1}
.toast{position:fixed;bottom:18px;right:18px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;font-size:13px;color:var(--txt);z-index:1000;transform:translateX(130%);transition:transform 0.3s;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(0)}
.toast.ts{border-color:rgba(52,211,153,0.4)}
.toast.te{border-color:rgba(248,113,113,0.4)}
.lov{position:fixed;inset:0;background:rgba(10,11,16,0.92);display:flex;align-items:center;justify-content:center;z-index:998;flex-direction:column;gap:14px}
.lsp{width:38px;height:38px;border:3px solid var(--border);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltx{font-size:13px;color:var(--txt2)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:90px;padding:0 2px}
.bg-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.bars-w{display:flex;align-items:flex-end;gap:2px;height:78px}
.bar{width:13px;border-radius:3px 3px 0 0;transition:height 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.bar-lbl{font-size:9px;color:var(--txt3)}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const firebaseConfig = {
  apiKey: "AIzaSyDcIFCq1ujGP-0KR6AJaM0s7f5wkT9ea4E",
  authDomain: "financeiro-ia-58343.firebaseapp.com",
  projectId: "financeiro-ia-58343",
  storageBucket: "financeiro-ia-58343.firebasestorage.app",
  messagingSenderId: "312584896401",
  appId: "1:312584896401:web:99ae11d48593bbf5c7e430"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SUPABASE_URL = localStorage.getItem('financeai_supabase_url') || '';
const SUPABASE_ANON_KEY = localStorage.getItem('financeai_supabase_anon_key') || '';
const SUPABASE_DEFAULT_CATEGORIA_ID = localStorage.getItem('financeai_supabase_categoria_id') || '';

const supabase = (SUPABASE_URL && SUPABASE_ANON_KEY)
  ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

window.db = db;
window.supabase = supabase;
window.supabaseReady = !!supabase;
window.FB = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc, onSnapshot, query, orderBy };

document.getElementById('lov').style.display = 'none';
document.getElementById('sdot').className = 'sync-dot online';
document.getElementById('stxt').textContent = 'Online — Firebase ativo';
window.firebaseReady = true;

// Load all data from Firestore
async function loadAll() {
  const cols = ['receitas','despesas','produtos','fornecedores','apagar','areceber','fechamentos'];
  for(const col of cols) {
    try {
      const snap = await getDocs(collection(db, col));
      window.state[col] = snap.docs.map(d => ({...d.data(), _id: d.id}));
    } catch(e) { window.state[col] = []; }
  }
  window.render();
  window.updateBadges();
}

window.dbAdd = async (col, data) => {
  setSaving();
  const ref = await addDoc(collection(db, col), {...data, ts: Date.now()});
  setOnline();
  return ref.id;
};
window.dbDel = async (col, id) => {
  setSaving();
  await deleteDoc(doc(db, col, id));
  setOnline();
};
window.dbUpd = async (col, id, data) => {
  setSaving();
  await updateDoc(doc(db, col, id), data);
  setOnline();
};

function setSaving() {
  document.getElementById('sdot').className = 'sync-dot saving';
  document.getElementById('stxt').textContent = 'Salvando...';
}
function setOnline() {
  document.getElementById('sdot').className = 'sync-dot online';
  document.getElementById('stxt').textContent = 'Salvo na nuvem ✓';
  setTimeout(()=>{ document.getElementById('stxt').textContent = 'Online — Firebase ativo'; }, 2000);
}

window.executarAgenteFinanceiro = async (acao, payload = {}) => {
  if (!window.supabase) {
    throw new Error('Supabase não configurado');
  }

  const { data, error } = await window.supabase.rpc('executar_agente_financeiro', {
    p_acao: acao,
    p_payload: payload
  });

  if (error) throw error;
  return data;
};

window.buscarLancamentoSupabase = async ({ descricao, valor, vencimento }) => {
  if (!window.supabase) return null;
  const res = await window.executarAgenteFinanceiro('contas_a_pagar');
  const contas = res?.resultado || [];
  const alvoDesc = (descricao || '').trim().toLowerCase();
  const alvoValor = Number(valor || 0);
  const alvoVenc = vencimento || null;

  const match = [...contas].reverse().find(c => {
    const descOk = (c.descricao || '').trim().toLowerCase() === alvoDesc;
    const valorOk = Math.abs(Number(c.valor || 0) - alvoValor) < 0.01;
    const vencOk = !alvoVenc || c.vencimento === alvoVenc;
    return descOk && valorOk && vencOk;
  });

  return match?.id || null;
};

async function sincronizarContaPagarNoSupabase(item) {
  if (!window.supabase) return { ok:false, motivo:'supabase_nao_configurado' };
  try {
    const categoriaIdRaw = localStorage.getItem('financeai_supabase_categoria_id') || '';
    const payload = {
      item_nome: item.item_nome || item.desc || item.descricao || 'Despesa',
      categoria_id: categoriaIdRaw ? Number(categoriaIdRaw) : null,
      fornecedor_nome: item.fornecedor || 'Fornecedor não informado',
      valor: Number(item.valor || 0),
      data: item.data || new Date().toISOString().slice(0,10),
      vencimento: item.venc || item.vencimento || item.data || new Date().toISOString().slice(0,10),
      descricao: item.desc || item.descricao || 'Lançamento financeiro'
    };

    await window.executarAgenteFinanceiro('registrar_despesa', payload);
    const supabaseId = await window.buscarLancamentoSupabase({
      descricao: payload.descricao,
      valor: payload.valor,
      vencimento: payload.vencimento
    });

    return { ok:true, supabase_id:supabaseId || null };
  } catch (e) {
    console.error('Falha ao sincronizar no Supabase', e);
    return { ok:false, motivo:e.message || 'erro_desconhecido' };
  }
}

function handleDrop(e) {

function handlePDF(e) { const f=e.target.files[0]; if(f) processarPDF(f); }

async function processarPDF(file) {
  if(!API_KEY) { toast('Configure sua API Key em Configurações','te'); state.page='config'; render(); return; }
  document.getElementById('pdf-drop').style.display='none';
  document.getElementById('pdf-proc').style.display='block';
  try {
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let txt='';
    for(let i=1;i<=Math.min(pdf.numPages,6);i++) {
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      txt+=ct.items.map(item=>item.str).join(' ')+'\n';
    }
    const result=await analisarPDFcomIA(txt,file.name);
    state.pdfPendentes.push({...result,arquivo:file.name});
    document.getElementById('pdf-proc').style.display='none';
    document.getElementById('pdf-drop').style.display='block';
    render(); toast('PDF analisado! Confirme os dados.');
  } catch(err) {
    document.getElementById('pdf-proc').style.display='none';
    document.getElementById('pdf-drop').style.display='block';
    toast('Erro: '+err.message,'te');
  }
}

async function analisarPDFcomIA(texto, arquivo) {
  const prompt=`Você é um assistente financeiro especializado em joalheria, ourivesaria e metais preciosos. Analise o texto deste documento financeiro e retorne APENAS JSON válido (sem markdown):
{
  "tipo": "despesa" ou "receita" ou "apagar",
  "descricao": "descrição curta",
  "fornecedor": "nome do fornecedor/emissor",
  "cliente": "nome do cliente se houver",
  "valor": número total,
  "vencimento": "YYYY-MM-DD se houver",
  "categoria": "Fixo|Estoque|Pessoal|Marketing|Impostos|Vendas|Serviços|Ouro/Metais|Outros",
  "forma_pagamento": "Boleto|PIX|Cheque|Transferência|Dinheiro",
  "produtos": [{"nome":"...","qtd":número,"preco":número,"unidade":"grama|quilate|peça"}],
  "resumo": "resumo em 1 frase"
}
Texto: ${texto.slice(0,4000)}`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const data=await res.json();
  const txt=data.content?.[0]?.text||'{}';
  try { return JSON.parse(txt.replace(/```json|```/g,'').trim()); }
  catch(e) { return {tipo:'despesa',descricao:arquivo,resumo:'Não foi possível extrair dados',valor:0}; }
}

function formatarMoeda(valor) {
  const numero = Number(valor || 0);
  return numero.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function formatarData(data) {
  if (!data) return '-';
  const d = new Date(data);
  if (isNaN(d.getTime())) return data;
  return d.toLocaleDateString('pt-BR');
}

function obterValor(obj, chaves = []) {
  for (const chave of chaves) {
    if (obj && obj[chave] !== undefined && obj[chave] !== null) {
      return obj[chave];
    }
  }
  return null;
}

function obterListaContas(data) {
  if (Array.isArray(data)) return data;
  if (Array.isArray(data?.contas)) return data.contas;
  if (Array.isArray(data?.dados)) return data.dados;
  if (Array.isArray(data?.resultado)) return data.resultado;
  if (Array.isArray(data?.data)) return data.data;
  return [];
}

function obterResumo(data) {
  if (!data) return {};
  if (data.resumo) return data.resumo;
  if (data.dados) return data.dados;
  if (data.resultado) return data.resultado;
  return data;
}

async function carregarResumo() {
  const { data, error } = await chamarAgente('resumo');

  if (error) {
    console.error('Erro resumo:', error);
    return;
  }

  const r = obterResumo(data);

  document.getElementById('cardTotalAPagar')?.innerText = formatarMoeda(obterValor(r, ['total_a_pagar']));
  document.getElementById('cardTotalAtrasado')?.innerText = formatarMoeda(obterValor(r, ['total_atrasado']));
  document.getElementById('cardTotalAVencer')?.innerText = formatarMoeda(obterValor(r, ['total_a_vencer']));
  document.getElementById('cardTotalAgendado')?.innerText = formatarMoeda(obterValor(r, ['total_agendado']));
  document.getElementById('cardTotalPago')?.innerText = formatarMoeda(obterValor(r, ['total_pago']));
  document.getElementById('cardVencendoHoje')?.innerText = formatarMoeda(obterValor(r, ['vencendo_hoje']));
  document.getElementById('cardVencendo7Dias')?.innerText = formatarMoeda(obterValor(r, ['vencendo_7_dias']));
  document.getElementById('cardQtdContasAbertas')?.innerText = obterValor(r, ['qtd_contas_abertas']) ?? 0;
}

// ===============================
// TABELAS
// ===============================
function montarLinha(conta) {
  const fornecedor = obterValor(conta, ['fornecedor_nome', 'fornecedor']) || '-';
  const item = obterValor(conta, ['item_nome', 'item']) || '-';
  const descricao = obterValor(conta, ['descricao']) || '-';
  const valor = obterValor(conta, ['valor']) || 0;
  const vencimento = obterValor(conta, ['data_vencimento']) || null;
  const status = obterValor(conta, ['status']) || '-';

  return `
    <tr>
      <td>${conta.id ?? '-'}</td>
      <td>${fornecedor}</td>
      <td>${item}</td>
      <td>${descricao}</td>
      <td>${formatarMoeda(valor)}</td>
      <td>${formatarData(vencimento)}</td>
      <td>${status}</td>
    </tr>
  `;
}

function renderTabela(lista, id) {
  const el = document.getElementById(id);

  if (!lista.length) {
    el.innerHTML = `<tr><td colspan="7">Sem dados</td></tr>`;
    return;
  }

  el.innerHTML = lista.map(montarLinha).join('');
}

// ===============================
// CONTAS DO DIA
// ===============================
async function carregarContasDoDia() {
  const { data, error } = await chamarAgente('contas_do_dia');

  if (error) {
    console.error(error);
    return;
  }

  const lista = obterListaContas(data);
  renderTabela(lista, 'tbodyContasDia');
}

// ===============================
// CONTAS A PAGAR
// ===============================
async function carregarContasAPagar() {
  const { data, error } = await chamarAgente('contas_a_pagar');

  if (error) {
    console.error(error);
    return;
  }

  const lista = obterListaContas(data);
  renderTabela(lista, 'tbodyContasAPagar');
}

// ===============================
// EXECUTAR PAGAMENTOS
// ===============================
async function executarPagamentosAgendados() {
  const { error } = await chamarAgente('executar_pagamentos_agendados');

  if (error) {
    console.error(error);
    return;
  }

  await carregarTudo();
}

// ===============================
// CARREGAR TUDO
// ===============================
async function carregarTudo() {
  await carregarResumo();
  await carregarContasDoDia();
  await carregarContasAPagar();
}
render();
</script>
